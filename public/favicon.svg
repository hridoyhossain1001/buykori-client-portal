<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Royal Blue Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>

    <!-- Shield Shadow & Shading -->
    <linearGradient id="shieldRightShade" x1="50%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0.35" />
    </linearGradient>

    <!-- Emerald Arrow Gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- Main Shield Body -->
  <g filter="url(#dropShadow)">
    <!-- Outer Shield Body -->
    <path d="M 256 50 C 340 50 410 70 410 70 C 410 240 370 380 256 460 C 142 380 102 240 102 70 C 102 70 172 50 256 50 Z" fill="url(#shieldGrad)" />
    
    <!-- Shield Right Side Shading for 3D Effect -->
    <path d="M 256 50 C 340 50 410 70 410 70 C 410 240 370 380 256 460 L 256 50 Z" fill="url(#shieldRightShade)" />

    <!-- Inner Shield Inset Border -->
    <path d="M 256 68 C 330 68 392 86 392 86 C 392 235 358 358 256 432 C 154 358 120 235 120 86 C 120 86 182 68 256 68 Z" fill="none" stroke="#60A5FA" stroke-width="4" opacity="0.4" />

    <!-- Bold Letter 'B' -->
    <text x="256" y="342" text-anchor="middle" font-family="'Inter', 'Space Grotesk', system-ui, sans-serif" font-weight="900" font-size="250" fill="#FFFFFF" letter-spacing="-4">B</text>

    <!-- Teal/Emerald Curved Arrow sweeping over Top-Right Shield -->
    <!-- Outer White Outline for Arrow -->
    <path d="M 330 220 C 370 180 430 110 370 65 C 325 30 280 60 275 80" fill="none" stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" />
    <path d="M 320 235 L 390 225 L 355 160 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="12" stroke-linejoin="round" />

    <!-- Inner Emerald Arrow Body -->
    <path d="M 330 220 C 370 180 430 110 370 65 C 325 30 280 60 275 80" fill="none" stroke="url(#arrowGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M 320 235 L 390 225 L 355 160 Z" fill="url(#arrowGrad)" stroke="url(#arrowGrad)" stroke-width="4" stroke-linejoin="round" />
  </g>
</svg>
